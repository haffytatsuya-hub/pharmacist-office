<body>
    <!-- Parallax Background -->
    <div class="parallax-bg">
        <div class="parallax-item parallax-1">💊</div>
        <div class="parallax-item parallax-2">⚕️</div>

            <div class="gallery-item pdf-gallery-item"><div class="pdf-viewer" style="display: flex; align-items: center; justify-content: center; height: 100%; background: linear-gradient(135deg, rgba(0, 217, 217, 0.1) 0%, rgba(0, 217, 217, 0.05) 100%); font-size: 3rem;">📄</div><div class="gallery-content"><h3 class="gallery-title">鼻噴霧用ステロイド薬まとめ</h3><div class="gallery-actions"><a href="./鼻噴霧用ステロイド薬まとめ.pdf" download class="btn btn-download"><span>⬇️</span><span>ダウンロード</span></a><button class="btn btn-like" onclick="toggleLike(this, 1)"><span class="like-icon">♡</span><span class="like-count">0</span></button></div></div></div>

            <div class="gallery-item pdf-gallery-item"><div class="pdf-viewer" style="display: flex; align-items: center; justify-content: center; height: 100%; background: linear-gradient(135deg, rgba(0, 217, 217, 0.1) 0%, rgba(0, 217, 217, 0.05) 100%); font-size: 3rem;">📄</div><div class="gallery-content"><h3 class="gallery-title">ベンゾジアゼピン系睡眠薬まとめ②</h3><div class="gallery-actions"><a href="./ベンゾジアゼピン系睡眠薬まとめ②.pdf" download class="btn btn-download"><span>⬇️</span><span>ダウンロード</span></a><button class="btn btn-like" onclick="toggleLike(this, 3)"><span class="like-icon">♡</span><span class="like-count">0</span></button></div></div></div>

        <div id="noResults" class="no-results hidden">
